    window.initFPAndSetDate = function(elId, dateVal) {

    // --- Core Utilities & Date Handlers ---
    window.esc = function(s) { if(!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); };
    window.safeStr = function(s) { if(!s) return ''; return encodeURIComponent(s).replace(/'/g, "%27"); };
    
    window.safeParseDate = function(val) {
        if (!val) return null; // เปลี่ยนจาก new Date() เป็น null เพื่อไม่ให้มั่ววันปัจจุบัน
        if (val instanceof Date && !isNaN(val.getTime())) return val;

        let dStr = String(val).trim();
        if (dStr === '') return null;

        if (dStr.includes('T') && dStr.endsWith('Z')) {
            let parsedD = new Date(dStr);
            if (!isNaN(parsedD.getTime())) return parsedD;
        }

        let y, m, d;
        let isParsed = false;

        // ดักจับท่าที่ 1: เลข Serial ของ Excel (เช่น 45000)
        if (!isNaN(dStr) && parseFloat(dStr) > 10000) {
            let tempD = new Date(Math.round((parseFloat(dStr) - 25569) * 86400 * 1000));
            y = tempD.getFullYear(); 
            m = tempD.getMonth() + 1; 
            d = tempD.getDate();
            isParsed = true;
        } else {
            // ดักจับท่าที่ 2: แปลงเดือนภาษาไทยและอังกฤษเป็นตัวเลข
            const monthsDict = {
                'ม.ค.': 1, 'มกราคม': 1, 'ก.พ.': 2, 'กุมภาพันธ์': 2, 'มี.ค.': 3, 'มีนาคม': 3,
                'เม.ย.': 4, 'เมษายน': 4, 'พ.ค.': 5, 'พฤษภาคม': 5, 'มิ.ย.': 6, 'มิถุนายน': 6,
                'ก.ค.': 7, 'กรกฎาคม': 7, 'ส.ค.': 8, 'สิงหาคม': 8, 'ก.ย.': 9, 'กันยายน': 9,
                'ต.ค.': 10, 'ตุลาคม': 10, 'พ.ย.': 11, 'พฤศจิกายน': 11, 'ธ.ค.': 12, 'ธันวาคม': 12,
                'JAN': 1, 'FEB': 2, 'MAR': 3, 'APR': 4, 'MAY': 5, 'JUN': 6,
                'JUL': 7, 'AUG': 8, 'SEP': 9, 'OCT': 10, 'NOV': 11, 'DEC': 12
            };
            
            let cleanStr = dStr.toUpperCase();
            for (let key in monthsDict) {
                if (cleanStr.includes(key) || cleanStr.includes(key.toUpperCase())) {
                    // แทนที่ชื่อเดือนด้วยตัวเลข (ครอบด้วยขีด - เพื่อให้แยกง่าย)
                    cleanStr = cleanStr.replace(new RegExp(key, 'gi'), `-${monthsDict[key]}-`);
                    break;
                }
            }

            // แยกข้อความด้วย เว้นวรรค, ขีด (-), หรือทับ (/)
            let parts = cleanStr.split(/[\s\-\/]+/);
            // กรองเอาเฉพาะที่เป็นตัวเลข
            let nums = parts.map(p => parseInt(p, 10)).filter(n => !isNaN(n));

            if (nums.length >= 3) {
                // สมมติฐานหลักคือ วัน-เดือน-ปี
                d = nums[0];
                m = nums[1];
                y = nums[2];
                // แต่ถ้าตัวแรกเกิน 1000 แสดงว่าเป็น ปี-เดือน-วัน ให้สลับกัน
                if (d > 1000) { let t = d; d = y; y = t; }
                isParsed = true;
            } else {
                // ท่าไม้ตาย ให้ระบบพยายามเดาเอง
                let tempD = new Date(dStr);
                if (!isNaN(tempD.getTime())) {
                    y = tempD.getFullYear(); m = tempD.getMonth() + 1; d = tempD.getDate();
                    isParsed = true;
                }
            }
        }

        // เมื่อแยกวัน เดือน ปี สำเร็จแล้ว มาซ่อมปี พ.ศ. ให้เป็น ค.ศ.
        if (isParsed && !isNaN(y) && !isNaN(m) && !isNaN(d)) {
            if (y > 2500) { y -= 543; } // กรอก 2568 -> 2025
            else if (y >= 1950 && y <= 1999) { y += 57; } // พิมพ์ 68 Excel มองเป็น 1968 -> 2025rea
            else if (y >= 50 && y <= 99) { y += 1957; } // พิมพ์ 68 ลอยๆ -> 2025
            
            let finalDate = new Date(y, m - 1, d);
            if (!isNaN(finalDate.getTime())) {
                return finalDate;
            }
        }

        return null; // ถ้าสุดวิสัยจริงๆ คืนค่า null เพื่อปล่อยให้ช่องว่าง ดีกว่าแสดงวันปัจจุบัน
    };

    window.formatDateTH = function(dStr) { 
  if (!dStr) return '-'; 
  
  // กรณีมีการเลือกหลายวันคั่นด้วย Comma
  if (String(dStr).includes(',')) {
    let dates = String(dStr).split(',').map(s => s.trim());
    let formattedDates = dates.map(ds => {
      let d = window.safeParseDate(ds);
      if(isNaN(d.getTime())) return String(ds);
      return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + (d.getFullYear() + 543);
    });
    return formattedDates.join(' และ '); // แสดงผลเช่น 13/02/2569 และ 15/02/2569
  }

  // กรณีวันเดียว (โค้ดเดิม)
  let d = window.safeParseDate(dStr); 
  if(isNaN(d.getTime())) return String(dStr);
  return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + (d.getFullYear() + 543); 
};

    window.calculateBillingCycle = function(sDate, tDate, meterDetails = null) {
    if(!sDate) return 0;
    const s = window.safeParseDate(sDate), t = tDate ? window.safeParseDate(tDate) : new Date();
    if(!s || !t) return 0;

    // หาความต่างของเดือนแบบดิบๆ
    let diff = (t.getFullYear() - s.getFullYear()) * 12 + (t.getMonth() - s.getMonth());

    if (!meterDetails || meterDetails.length === 0) {
        return diff > 0 ? diff : 0; 
    }

    // หาวันที่ตัดรอบบิล จากการตั้งค่าอุปกรณ์
    let m = meterDetails[0];
    let cutoffDay = 1;
    
    if (m.ruleType === 'end_minus_x') {
        // แก้บั๊ก: บังคับใช้ฐาน 30 วันในการคำนวณ "วันที่ตั้งใจจะให้ตัดรอบจริงๆ" 
        // จะได้ไม่โดนเดือนที่มี 31 วัน (เช่น ธันวา) ทำให้วันตัดรอบเด้งไปเป็นวันที่ 21
        cutoffDay = 30 - (parseInt(m.ruleValue) || 0);
    } else if (m.ruleType === 'exact_day') { 
        // เผื่ออนาคตคุณทำ Dropdown แบบระบุวันที่เป๊ะๆ
        cutoffDay = parseInt(m.ruleValue) || 1;
    }

    // ลอจิก: 
    // วันตัดรอบ > วันเริ่มงาน = นับเดือนนั้นเป็นงวด 1 (offset = 1)
    // วันตัดรอบ <= วันเริ่มงาน = นับเดือนถัดไปเป็นงวด 1 (offset = 0)
    let offset = (cutoffDay > s.getDate()) ? 1 : 0;

    let cycle = diff + offset;
    return cycle > 0 ? cycle : 0;
};

    window.formatForDateInput = function(val) {
        if (!val) return '';
        let d = window.safeParseDate(val);
        if (!d) return ''; 
        
        // ต้องคืนค่าเป็นมาตรฐาน YYYY-MM-DD (ค.ศ.) เพื่อให้ Flatpickr นำไปประมวลผลต่อได้
        // ส่วนการแสดงผลเป็น วัน/เดือน/พ.ศ. ปฏิทิน Flatpickr จะจัดการแปลงให้เองบนหน้าเว็บ
        let y = d.getFullYear(); 
        let m = String(d.getMonth() + 1).padStart(2, '0');
        let day = String(d.getDate()).padStart(2, '0');
        
        return `${y}-${m}-${day}`;
    };

    let allData = { projects: [], departments: [], statuses: {}, maintenance: [], logs: [], companies: [], cycleOverrides: {}, settings: {} };
    let curDate = new Date(); let map = null; let markers = []; let selectedCalDay = null; 
    let radiusCircle = null; let radiusCenterMarker = null; let _radiusPickOnce = null;
    let radiusFilter = { active: false, km: 10, lat: null, lng: null };

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = (d) => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function clearRadiusVisualOnly_() {
      if (radiusCircle && map) { try { map.removeLayer(radiusCircle); } catch (e) {} }
      if (radiusCenterMarker && map) { try { map.removeLayer(radiusCenterMarker); } catch (e) {} }
      radiusCircle = null;
      radiusCenterMarker = null;
    }

    window.reapplyRadiusIfActive = function() {
      if (radiusFilter.active && radiusFilter.lat != null && radiusFilter.lng != null) {
        window.applyRadiusFilter(radiusFilter.lat, radiusFilter.lng);
      }
    };

    window.styleMarkersByRadius = function() {
      if (!map || !radiusFilter.active) return;
      const km = radiusFilter.km;
      const lat0 = radiusFilter.lat;
      const lng0 = radiusFilter.lng;
      if (lat0 == null || lng0 == null) return;
      const insideList = [];
      let inside = 0;
      markers.forEach((m) => {
        const ll = m.getLatLng();
        const d = haversineKm(lat0, lng0, ll.lat, ll.lng);
        if (d <= km) {
          m.setOpacity(1);
          inside++;
          const p = m._proj;
          if (p) {
            const name = (p.ProjectName || p.projectName || p.ShortName || '').toString();
            const comp = (p.Company || p.company || '').toString();
            insideList.push({ name: name || '(ไม่มีชื่อ)', comp: comp, km: d });
          }
        } else {
          m.setOpacity(0.28);
        }
      });
      insideList.sort((a, b) => a.km - b.km);
      const el = document.getElementById('radiusSummary');
      if (!el) return;
      if (!radiusFilter.active) { el.classList.add('hidden'); return; }
      el.classList.remove('hidden');
      const lines = insideList.slice(0, 25).map((it) => `<li class="mb-1"><span class="font-bold">${window.esc(it.name)}</span> <span class="text-slate-500">${it.comp ? '(' + window.esc(it.comp) + ')' : ''}</span> — <span class="text-sky-600 dark:text-sky-400 font-mono">${it.km.toFixed(1)} กม.</span></li>`);
      const more = insideList.length > 25 ? `<p class="mt-2 text-slate-500">… และอีก ${insideList.length - 25} รายการ</p>` : '';
      el.innerHTML = `<p class="font-bold text-sm text-emerald-800 dark:text-emerald-300 mb-2"><i class="fa-solid fa-bullseye mr-1"></i>ในรัศมี ${km} กม. จากจุดที่เลือก: พบ <b>${inside}</b> โครงการ</p><ul class="list-none pl-0 max-h-40 overflow-y-auto border-t border-emerald-200/60 dark:border-emerald-800 pt-2">${lines.join('')}</ul>${more}`;
    };

    window.applyRadiusFilter = function(lat, lng) {
      if (!map || typeof L === 'undefined' || !L.circle) return;
      const la = parseFloat(lat);
      const ln = parseFloat(lng);
      if (!isFinite(la) || !isFinite(ln)) return;
      const km = parseFloat(document.getElementById('mapRadiusKm') && document.getElementById('mapRadiusKm').value) || 10;
      radiusFilter = { active: true, km: km, lat: la, lng: ln };
      clearRadiusVisualOnly_();
      try { map.invalidateSize(); } catch (e) {}
      const radiusM = Math.max(100, km * 1000);
      radiusCircle = L.circle([la, ln], {
        radius: radiusM,
        color: '#0284c7',
        fillColor: '#0ea5e9',
        fillOpacity: 0.22,
        opacity: 1,
        weight: 3,
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(map);
      if (typeof radiusCircle.bringToFront === 'function') radiusCircle.bringToFront();
      radiusCenterMarker = L.marker([la, ln], {
        icon: L.divIcon({
          html: '<div style="background:#0284c7;width:24px;height:24px;border-radius:50%;border:3px solid white;box-shadow:0 0 12px rgba(2,132,199,0.95);"></div>',
          className: '',
          iconSize: [24, 24],
          iconAnchor: [12, 12]
        })
      }).addTo(map);
      if (typeof radiusCenterMarker.bringToFront === 'function') radiusCenterMarker.bringToFront();
      window.styleMarkersByRadius();
      try {
        map.fitBounds(radiusCircle.getBounds(), { padding: [36, 36], maxZoom: 11 });
      } catch (e) {}
    };

    window.showRadiusFromGps = function() {
      if (!map) { window.showToast && window.showToast('กรุณาเปิดแผนที่ก่อน'); return; }
      if (!navigator.geolocation) {
        Swal.fire({ icon: 'error', title: 'ไม่รองรับ GPS', text: 'เบราว์เซอร์นี้ไม่สามารถดึงพิกัดได้' });
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => window.applyRadiusFilter(pos.coords.latitude, pos.coords.longitude),
        () => Swal.fire({ icon: 'warning', title: 'ดึงพิกัดไม่ได้', text: 'กรุณาอนุญาตให้เว็บเข้าถึงตำแหน่ง (Location)' })
      );
    };

    window.enableRadiusPickOnMap = function() {
      if (!map) { window.showToast && window.showToast('กรุณาเปิดแผนที่ก่อน'); return; }
      if (_radiusPickOnce) {
        map.off('click', _radiusPickOnce);
        _radiusPickOnce = null;
      }
      if (window.showToast) window.showToast('คลิกบนแผนที่เพื่อเลือกจุดศูนย์กลางรัศมี');
      map.getContainer().style.cursor = 'crosshair';
      _radiusPickOnce = function(e) {
        map.off('click', _radiusPickOnce);
        map.getContainer().style.cursor = '';
        _radiusPickOnce = null;
        window.applyRadiusFilter(e.latlng.lat, e.latlng.lng);
      };
      map.once('click', _radiusPickOnce);

    // Normalize ประเภทโครงการให้รองรับค่าที่สะกดคลาดเคลื่อนจากข้อมูลเดิม เช่น nationwind
    window.getProjectCategory = function(p) {
      let rawType = String((p && (p.ProjectType || p.projectType || p.Type || p.type)) || '').trim().toLowerCase();
      let phase = String((p && (p.Phase || p.phase)) || '').trim();
      if (rawType === 'nationwind' || rawType === 'nation wide') rawType = 'nationwide';
      if (rawType === 'nationwide' || rawType === 'nw' || rawType === 'multi' || rawType === 'multi-site' || phase !== '') {
        return 'nationwide';
      }
      return 'single';
    };

    // ฟังก์ชั่นดึงข้อมูลอัพเดทให้รองรับ Property ทุก Case 
    // ฟังก์ชั่นดึงข้อมูลอัพเดทให้รองรับ Property ทุก Case
    window.getUniqueProjects = function() { 
      let u = {}; 
      // 1. ดึงค่าจาก Dropdown รูปแบบสัญญา
      let contractFilter = document.getElementById('contractFilter') ? document.getElementById('contractFilter').value : 'all';

      (allData.projects || []).forEach(p => { 
        // 2. เช็คว่าเป็นโครงการทั่วประเทศหรือไม่
        let isNationwide = window.getProjectCategory(p) === 'nationwide';

        // 3. กรองข้อมูลตามที่เลือก
        if (contractFilter === 'single' && isNationwide) return;
        if (contractFilter === 'nationwide' && !isNationwide) return;

        let pComp = String(p.Company || p.company || '').trim().toLowerCase();
        let pProj = String(p.ProjectName || p.projectName || '').trim().toLowerCase();
        let pMain = String(p.MainProjectName || p.mainProjectName || '').trim().toLowerCase();
        let pPhase = String(p.Phase || p.phase || '').trim().toLowerCase();
        let pDept = String(p.Department || p.department || '').trim().toLowerCase();
        let pType = window.getProjectCategory(p);
        // กันการชนกันของ key ระหว่างโครงการคนละแผนก/คนละโครงการหลักที่ชื่อซ้ำ
        let k = [pType, pComp, pMain, pProj, pPhase, pDept].join("|||");
        let mNo = p.MeterNo || p.meterNo || '';
        let rType = p.RuleType || p.ruleType || 'first_day';
        let rVal = p.RuleValue || p.ruleValue || 0;
        let pIdVal = p.ID || p.id || ''; 
        if(!u[k]) { 
            u[k] = Object.assign({}, p, { 
                ID: pIdVal, 
                AllMeters: [mNo], 
                SubIDs: [pIdVal], 
                MeterDetails: [{meterNo: mNo, ruleType: rType, ruleValue: rVal}], 
                DefaultInspector: p.DefaultInspector || p.inspector || p.defaultInspector || '' 
            }); 
        } 
        else { 
            u[k].AllMeters.push(mNo); 
            u[k].SubIDs.push(pIdVal); 
            u[k].MeterDetails.push({meterNo: mNo, ruleType: rType, ruleValue: rVal}); 
        } 
      }); 
      return Object.values(u); 
    };

      const fD = document.getElementById('deptFilter').value;

      let allIndividualProjects = window.getUniqueProjects().filter(p => fD === 'all' || (p.Department||p.department) === fD);

      let totalKwp = 0;

        const tV = Math.floor((parseInt(durationCyclesStr) || Math.round(parseFloat(durationYearsStr)*12) || 0) / f);

    window.renderMaintCards = function() {

        }
        groups[groupKey].projects.push(p);
    });

    let cardDataArray = [];

    for(let key in groups) {

        let p0 = g.projects[0];
        let startD = p0.StartDate || p0.startDate;
        
        let freqPerYear = parseInt(p0.MaintFreq || 2); 
        let durationYears = parseFloat(p0.DurationYears || p0.durationYear) || 20; 
        let totalExpectedRounds = durationYears * freqPerYear;

let isNationwide = window.getProjectCategory(p) === 'nationwide';
let nwKey = isNationwide ? 'NW::' + mainProj + '::' + String(pPhase || '').trim() : '';

let groupKey = pPhase ? 'PHASE::' + pPhase : 'INDIV::' + pId;
let tC = parseInt(durationCyclesStr) || Math.round(parseFloat(durationYearsStr)*12) || 0;

const pdfRecords = (allData.maintenance || []).filter(m => { 
  let mPID = String(m.ProjectID || '').trim(), pID = String(pId).trim(), k = String(groupKey).trim(), phaseK = pPhase ? 'PHASE::' + String(pPhase).trim() : ''; 
  return mPID === pID || mPID === k || mPID === ('INDIV::'+pID) || (phaseK && mPID === phaseK) || mPID === nwKey || (p.SubIDs && p.SubIDs.map(String).includes(mPID)); 
}).sort((a,b) => new Date(window.safeParseDate(a.ActualDate)) - new Date(window.safeParseDate(b.ActualDate)));
      
      pdfRecords.forEach((m, idx) => { m.displayVisitNo = idx + 1; });
      document.getElementById('pdf-table-body').innerHTML = pdfRecords.map((m, index, arr) => {

            cleanRemarks = (typeof m.Files === 'string' && !m.Files.trim().startsWith('[')) ? m.Files : '';

        let rType = p.MeterDetails && p.MeterDetails.length > 0 ? p.MeterDetails[0].ruleType : 'first_day';

        let cycleText = actualCycle ? '<br><small>(ตรงกับงวดที่ ' + actualCycle + '/' + tC + ')</small>' : '';
        let prevDate = index > 0 ? window.safeParseDate(arr[index-1].ActualDate) : null, gapText = '-';
        if(prevDate) { 
            let curD = window.safeParseDate(m.ActualDate); 
            gapText = ((curD.getFullYear() - prevDate.getFullYear())*12 + (curD.getMonth() - prevDate.getMonth())) + ' เดือน'; 
        }
        return `<tr><td style="border: 1px solid #ddd; padding: 10px; text-align: center;">${m.displayVisitNo || m.VisitNo}</td><td style="border: 1px solid #ddd; padding: 10px;">${window.formatDateTH(m.ActualDate)}${cycleText}</td><td style="border: 1px solid #ddd; padding: 10px; text-align: center; font-weight: bold; color: #f59e0b;">${gapText}</td><td style="border: 1px solid #ddd; padding: 10px;">${window.esc(cleanRemarks) || '-'}</td></tr>`; 
      }).join('') || '<tr><td colspan="4" style="text-align:center; padding: 10px;">ไม่มีข้อมูล</td></tr>';
      
      // ==========================================
      // เริ่มส่วนที่เพิ่มใหม่ (ตารางทบยอด 2 ครั้ง/ปี)
      // ==========================================
      let summaryHtml = '';
      let fRawStr = String(window.getSafeVal(p.MaintFreq || p.maintFreq)).trim().toLowerCase();
      let isTwiceAYear = (fRawStr === '2 ครั้ง/ปี' || fRawStr === 'flex' || fRawStr === 'แบบยืดหยุ่น' || fRawStr === '6' || fRawStr === '6 เดือนครั้ง (2 ครั้ง/ปี)');
      
      if (isTwiceAYear && (p.StartDate || p.startDate)) {
          let startDObj = window.safeParseDate(p.StartDate || p.startDate);
          let durationYearsVal = parseFloat(p.DurationYears || p.durationYear || p.durationYears || p.DurationYear) || 0;
let totalYears = Math.ceil(durationYearsVal);
          
          if (totalYears > 0 && !isNaN(startDObj.getTime())) {
              summaryHtml += '<div style="margin-top: 25px; page-break-inside: avoid;">';
              summaryHtml += '<h4 style="color: #1e40af; margin-bottom: 10px; font-size: 14px; font-weight: bold; background: #eff6ff; padding: 8px 12px; border-radius: 6px; border-left: 4px solid #3b82f6;">สรุปเป้าหมายและการบำรุงรักษารายปี (รวมทบยอดกรณีขาดล้าง)</h4>';
              summaryHtml += '<table style="width: 100%; border-collapse: collapse; font-size: 13px;">';
              summaryHtml += '<thead><tr style="background-color: #f8fafc; color: #475569; text-align: left;">';
              summaryHtml += '<th style="border: 1px solid #cbd5e1; padding: 10px; width: 25%;">ปีสัญญาที่</th>';
              summaryHtml += '<th style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; width: 12%;">เป้าหมาย<br>(ครั้ง)</th>';
              summaryHtml += '<th style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; width: 12%;">ทำจริง<br>(ครั้ง)</th>';
              summaryHtml += '<th style="border: 1px solid #cbd5e1; padding: 10px; width: 31%;">วันที่เข้าดำเนินการ</th>';
              summaryHtml += '<th style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; width: 20%;">สถานะ</th>';
              summaryHtml += '</tr></thead><tbody>';
              
              let carryOver = 0; 
              let today = new Date(); 

              for (let i = 0; i < totalYears; i++) {
    let currentStart = new Date(startDObj);
    currentStart.setFullYear(currentStart.getFullYear() + i);
    
    let currentEnd = new Date(currentStart);
    currentEnd.setFullYear(currentEnd.getFullYear() + 1);
    currentEnd.setDate(currentEnd.getDate() - 1); 
    
    let sMonthTh = thMonths[currentStart.getMonth()];
    let sYearTh = (currentStart.getFullYear() + 543).toString().slice(-2);
    let eMonthTh = thMonths[currentEnd.getMonth()];
    let eYearTh = (currentEnd.getFullYear() + 543).toString().slice(-2);
    
    let periodLabel = `ปีที่ ${i+1} <br><span style="font-size:10px; font-weight:normal; color:#64748b;">(${sMonthTh} ${sYearTh} - ${eMonthTh} ${eYearTh})</span>`;
    
    let washesInPeriod = pdfRecords.filter(m => {
        let d = window.safeParseDate(m.ActualDate || m.ScheduledDate);
        return d >= currentStart && d <= currentEnd;
    });
    
    let actualWashes = washesInPeriod.length;
    
    // เช็คช่วงเวลาของรอบนี้
    let isPast = today > currentEnd;
    let isCurrentYear = today >= currentStart && today <= currentEnd;
    let isFuture = today < currentStart;

    // การตั้งเป้าหมาย: อนาคตไม่ต้องทบยอดโชว์
    let targetWashes = isFuture ? 2 : 2 + carryOver; 
    
    // การคำนวณจำนวนทบยอด เพื่อนำไปใช้ในปีถัดไป
    if (isPast) {
        carryOver = Math.max(0, targetWashes - actualWashes);
    } else if (isCurrentYear) {
        carryOver = Math.max(0, targetWashes - actualWashes);
    }
    
    let datesHtml = washesInPeriod.length > 0 
        ? washesInPeriod.map((w, idx) => `<span style="color: #10b981; display: block; font-size: 11px;">${idx+1}. ${window.formatDateTH(w.ActualDate)}</span>`).join('') 
        : '<span style="color: #94a3b8;">-</span>';

    // คำนวณสถานะและสี
    let statusHtml = '';

        statusHtml = '<span style="color: #cbd5e1;">-</span>'; 
    } else if (actualWashes >= targetWashes) {
        statusHtml = '<span style="color: #10b981; font-weight: bold;">✅ ครบเป้าหมาย</span>';
    } else {
        let missing = targetWashes - actualWashes;
        if (isCurrentYear) {
            // คำนวณเดือนที่เหลือของรอบสัญญาปีนี้
            let diffM = (currentEnd.getFullYear() - today.getFullYear()) * 12 + (currentEnd.getMonth() - today.getMonth());
            
            // แจ้งเตือนสีส้มเมื่อใกล้หมดเวลา (เหลือ <= 2 เดือน)
            if (diffM <= 2 && diffM >= 0) {
                statusHtml = `<span style="color: #f97316; font-weight: bold;">⚠️ ใกล้กำหนด (ขาด ${missing})</span>`; // สีส้ม
            } else {
                statusHtml = `<span style="color: #3b82f6; font-weight: bold;">⏳ ขาดอีก ${missing} ครั้ง</span>`; // สีฟ้าปกติ
            }
        } 
        else if (isPast) {
            statusHtml = `<span style="color: #ef4444; font-weight: bold;">❌ ทบยอด ${missing} ครั้ง</span>`; // สีแดง
        }
    }

    summaryHtml += `<tr>
        <td style="border: 1px solid #cbd5e1; padding: 10px; font-weight: bold; color: #334155;">${periodLabel}</td>
        <td style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; font-weight: bold; color: #3b82f6;">${targetWashes}</td>
        <td style="border: 1px solid #cbd5e1; padding: 10px; text-align: center; font-weight: bold; color: ${actualWashes >= targetWashes ? '#10b981' : '#ef4444'};">${actualWashes}</td>
        <td style="border: 1px solid #cbd5e1; padding: 10px;">${datesHtml}</td>
        <td style="border: 1px solid #cbd5e1; padding: 10px; text-align: center;">${statusHtml}</td>
    </tr>`;
}
              summaryHtml += '</tbody></table></div>';
          }
      }
      
      let pdfSummaryContainer = document.getElementById('pdf-summary');
      if (!pdfSummaryContainer) {
          pdfSummaryContainer = document.createElement('div');
          pdfSummaryContainer.id = 'pdf-summary';
          document.getElementById('pdf-content').appendChild(pdfSummaryContainer);
      }
      pdfSummaryContainer.innerHTML = summaryHtml;
      // ==========================================
      
      window.showLoadingOverlay('สร้าง PDF...'); 
      const el = document.getElementById('pdf-container'); el.style.display = 'block'; el.style.zIndex = '1';
      html2pdf().set({ 
        margin: [10, 10, 10, 10], 
        filename: 'OM_Report_' + (pComp).replace(/ /g, '_') + '.pdf', 
        image: { type: 'jpeg', quality: 0.98 },

        pagebreak: { mode: ['css', 'legacy'], avoid: ['tr', 'h4', 'table', 'div[style*="page-break-inside: avoid"]'] }
      }).from(document.getElementById('pdf-content')).save().then(() => { el.style.display = 'none'; el.style.zIndex = '-1'; Swal.close(); });
    };

window.calcDuration = function(m, s) { 
  const yI = m === 'add' ? 'durYear' : 'eDurYear';
  const cI = m === 'add' ? 'durCycle' : 'eDurCycle';
  
  const yE = document.getElementById(yI), cE = document.getElementById(cI);

  if(s === 'year'){ 
    let y = parseFloat(yE.value); 
    // 1 ปี = 12 งวด (เดือน) โดยไม่ต้องสนใจความถี่การบำรุงรักษา
    if(!isNaN(y)) cE.value = Math.round(y * 12); 
  } else { 
    let c = parseFloat(cE.value); 
    // คำนวณงวดกลับเป็นปี (หาร 12)
    if(!isNaN(c)) yE.value = (c / 12).toFixed(2); 
  } 
};

    // 1. ฟังก์ชันสลับหน้าจอระหว่าง Single กับ Nationwide
    window.toggleProjectType = function(mode) {
    let typeSel = document.getElementById(mode === 'add' ? 'pType' : 'eType');
    let singleCont = document.getElementById(mode === 'add' ? 'singleSiteContainerAdd' : 'singleSiteContainerEdit'); 
    let multiCont = document.getElementById(mode === 'add' ? 'multiSiteContainerAdd' : 'multiSiteContainerEdit');

    // ดึง Element เพิ่มเติมเพื่อจัดการหน้าจอ
    let phaseInput = document.getElementById(mode === 'add' ? 'pPhase' : 'ePhase');
    let subSiteGroup = document.getElementById(mode === 'add' ? 'subSiteGroupAdd' : 'subSiteGroupEdit');
    let subSiteInput = document.getElementById(mode === 'add' ? 'pName' : 'eProj');
    let mainProjInput = document.getElementById(mode === 'add' ? 'mainPNameAdd' : 'eMainProj');
    let mainMetersGroup = document.getElementById(mode === 'add' ? 'mainMetersGroupAdd' : 'mainMetersGroupEdit');
    let mainLocationGroup = document.getElementById(mode === 'add' ? 'mainLocationGroupAdd' : 'mainLocationGroupEdit');

    if (!typeSel) return;

    let selValue = typeSel.value;

    if (selValue === 'single') {
        if (phaseInput) {
            phaseInput.disabled = true;
            phaseInput.value = ''; 
            phaseInput.classList.add('bg-slate-100', 'text-slate-400', 'cursor-not-allowed');
        }
        
        // 🟢 แบบ Single: แสดงทุกอย่างตามปกติ
        if (subSiteGroup) subSiteGroup.classList.remove('hidden');
        if (subSiteInput) subSiteInput.required = true;
        if (mainProjInput) mainProjInput.required = false;
        if (mainMetersGroup) mainMetersGroup.classList.remove('hidden');
        if (mainLocationGroup) mainLocationGroup.classList.remove('hidden');

    } else {
        // Nationwide
        if (phaseInput) {
            phaseInput.disabled = false;
            phaseInput.classList.remove('bg-slate-100', 'text-slate-400', 'cursor-not-allowed');
        }
        
        if (mode === 'add') {
            // 🔴 เฉพาะโหมด Add: ซ่อนสถานที่ย่อย, ซ่อนพิกัด, ซ่อนอุปกรณ์ เพราะไปทำในตาราง
            if (subSiteGroup) subSiteGroup.classList.add('hidden');
            if (subSiteInput) {
                subSiteInput.required = false;
                subSiteInput.value = ''; // เคลียร์เฉพาะตอนเพิ่มใหม่
            }
            if (mainMetersGroup) mainMetersGroup.classList.add('hidden');
            if (mainLocationGroup) {
                mainLocationGroup.classList.add('hidden');
                let locInput = document.getElementById('pLocation');
                if(locInput) locInput.value = ''; 
            }
        } else {
            // 🟢 โหมด Edit: แก้ไข Nationwide ย่อย ต้อง "แสดง" ข้อมูลทั้งหมดห้ามซ่อนเด็ดขาด
            if (subSiteGroup) subSiteGroup.classList.remove('hidden');
            if (subSiteInput) subSiteInput.required = true;
            if (mainMetersGroup) mainMetersGroup.classList.remove('hidden');
            if (mainLocationGroup) mainLocationGroup.classList.remove('hidden');
        }

        if (mainProjInput) mainProjInput.required = true;
    }

    if (!singleCont || !multiCont) return;

    if (selValue === 'nationwide') {
        singleCont.classList.add('hidden');
        multiCont.classList.remove('hidden');
        if (mode === 'add') {
            let siteCont = document.getElementById('sitesContainerAdd');
            if (siteCont && siteCont.innerHTML === '') {
                window.addSiteRow(siteCont.id);
            }
        }
    } else {
        singleCont.classList.remove('hidden');
        multiCont.classList.add('hidden');
    }
};

window.handleEditProject = async function(e) { 
      e.preventDefault(); window.showLoadingOverlay('อัปเดตข้อมูลและอัปโหลดไฟล์...'); 
      const finalFiles = await window.processExtraFiles('projExtraFilesEdit'); if(!finalFiles) return;
      
      const loc = document.getElementById('eLocation').value.split(','); 
      const metersPayload = Array.from(document.querySelectorAll('#eMetersContainer > div')).map(r => ({meterNo: r.querySelector('.e-m-no').value, ruleType: r.querySelector('.e-m-type').value, ruleValue: parseInt(r.querySelector('.e-m-val').value)||0})); 
      
      // แปลงค่าความถี่ให้เป็นภาษาไทยตรงกับฐานข้อมูลเป๊ะๆ 
      let freqMode = document.getElementById('eFreqMode').value;
      let finalFreq = freqMode === 'custom' ? document.getElementById('eFreqVal').value : '2 ครั้ง/ปี';
      
      let editSubIDs = document.getElementById('editSubIDs').value;
      let primaryId = editSubIDs.split(',')[0];
      const subIdList = editSubIDs.split(',').map(x => String(x || '').trim()).filter(Boolean);

      // ดึงข้อมูลโปรเจกต์เดิมมาเพื่อเอาชื่อ MainProjectName กลับไปเซฟ (ป้องกันข้อมูลหาย)
      const origProj = window.getUniqueProjects().find(x => String(x.ID) === String(primaryId));
      const mainProjName = document.getElementById('eMainProj').value || document.getElementById('eProj').value;
      const curType = document.getElementById('eType').value;
      const selectedDept = document.getElementById('eDept').value;

      if (!selectedDept) {
        Swal.close();
        Swal.fire('กรุณาตรวจสอบข้อมูล', 'โปรดเลือกแผนกก่อนบันทึกการแก้ไข', 'warning');
        return;
      }

      const data = { 
        kWp: document.getElementById('ekWp').value,
        id: primaryId, ID: primaryId, projectId: primaryId, ProjectID: primaryId,
        subIds: editSubIDs, SubIDs: editSubIDs,
        
        projectType: curType, ProjectType: curType, // <--- เพิ่มส่งประเภทกลับไป
        MainProjectName: mainProjName, mainProjectName: mainProjName, // <--- เพิ่มส่งชื่อโปรเจคหลักกลับไป
        
        company: document.getElementById('eComp').value, Company: document.getElementById('eComp').value,
        projectName: document.getElementById('eProj').value, ProjectName: document.getElementById('eProj').value,
        phase: document.getElementById('ePhase').value, Phase: document.getElementById('ePhase').value,
        shortName: '', ShortName: '',
        department: selectedDept, Department: selectedDept,
        durationCycle: document.getElementById('eDurCycle').value, DurationCycles: document.getElementById('eDurCycle').value, 
        durationYear: document.getElementById('eDurYear').value, DurationYears: document.getElementById('eDurYear').value, 
        maintFreq: finalFreq, MaintFreq: finalFreq,
        startDate: document.getElementById('eStartDate').value, StartDate: document.getElementById('eStartDate').value,
        peaRegion: document.getElementById('eRegion').value, PEARegion: document.getElementById('eRegion').value,
        lat: loc[0] ? loc[0].trim() : '', Lat: loc[0] ? loc[0].trim() : '',
        lng: loc[1] ? loc[1].trim() : '', Lng: loc[1] ? loc[1].trim() : '',
        vendorContract: document.getElementById('eVendorContract').value, VendorContract: document.getElementById('eVendorContract').value,
        ownerContract: document.getElementById('eOwnerContract').value, OwnerContract: document.getElementById('eOwnerContract').value,
        inspector: document.getElementById('eInspector').value, DefaultInspector: document.getElementById('eInspector').value,
        userName: window.currentUser.username, 
        projectFiles: finalFiles, ProjectFiles: JSON.stringify(finalFiles)
      }; 
      let completed = 0;
      let hasError = false;
      const total = Math.max(subIdList.length, 1);

      const handleDone = () => {
        completed++;
        if (completed < total) return;
        Swal.close();
        if (hasError) {
          Swal.fire('เสร็จสิ้นบางส่วน', 'มีบางรายการอัปเดตไม่สำเร็จ กรุณาลองใหม่อีกครั้ง', 'warning');
        } else {
          window.showToast('อัปเดตสำเร็จ');
          window.closeModal('detailModal');
        }
        window.fetchData();
      };

      const updateOne = (subId, meter) => {
        const payload = Object.assign({}, data, {
          id: subId, ID: subId, projectId: subId, ProjectID: subId,
          subIds: subId, SubIDs: subId,
          MeterNo: meter.meterNo || '',
          RuleType: meter.ruleType || 'first_day',
          RuleValue: parseInt(meter.ruleValue) || 0
        });
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.status === 'error') hasError = true;
            handleDone();
          })
          .withFailureHandler(() => {
            hasError = true;
            handleDone();
          })
          .updateFullProject(subId, payload);
      };

      if (subIdList.length === 0) {
        updateOne(primaryId, metersPayload[0] || { meterNo: '', ruleType: 'first_day', ruleValue: 0 });
        return;
      }

      subIdList.forEach((subId, idx) => {
        const meter = metersPayload[idx] || metersPayload[0] || { meterNo: '', ruleType: 'first_day', ruleValue: 0 };
        updateOne(subId, meter);
      });
    };

    window.initMap = function() { 
      if (_radiusPickOnce && map) {
        map.off('click', _radiusPickOnce);
        try { map.getContainer().style.cursor = ''; } catch (e) {}
        _radiusPickOnce = null;
      }
      radiusFilter = { active: false, km: 10, lat: null, lng: null };
      radiusCircle = null;
      radiusCenterMarker = null;
      markers = [];
      if (map) { map.remove(); map = null; }
      const sumEl = document.getElementById('radiusSummary');
      if (sumEl) { sumEl.classList.add('hidden'); sumEl.innerHTML = ''; }
      map = L.map('map').setView([13.7, 100.5], 6); 
      let tileUrl = document.documentElement.classList.contains('dark') ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
      L.tileLayer(tileUrl).addTo(map); setTimeout(() => { map.invalidateSize(); window.loadMapMarkers(); }, 500); 
    };
    window.loadMapMarkers = function() { 
      if(!map) return; markers.forEach(m => map.removeLayer(m)); markers = []; 
      const fDept = document.getElementById('deptFilter').value, rFilter = document.getElementById('mapRegionFilter').value, bounds = []; 
      window.getUniqueProjects().forEach(p => { 
        let pDept = p.Department || p.department;
        let pRegion = p.PEARegion || p.peaRegion;
        let pLat = p.Lat || p.lat;
        let pLng = p.Lng || p.lng;
        if(fDept !== 'all' && pDept !== fDept) return; if(rFilter !== 'all' && (!pRegion || !pRegion.startsWith(rFilter))) return;
        if(pLat && pLng) { 
          let marker = L.marker([parseFloat(pLat), parseFloat(pLng)], { icon: L.divIcon({ html: '<div style="background-color:#f59e0b; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(245,158,11,0.8);"></div>', className: '' }) }).addTo(map); 
          marker._proj = p;
          let detailBtn = window.checkAccess(pDept) ? `<div class="mt-4 text-center"><button onclick="window.openDetail('${p.ID}'); map.closePopup();" class="text-xs bg-royal-100 text-royal-700 px-4 py-2 rounded-xl w-full font-bold shadow-sm">ดูข้อมูล</button></div>` : '';
          marker.bindPopup(`<div class="text-sm font-sans p-1"><h4 class="font-bold text-royal-700 uppercase mb-1">${window.esc(p.Company||p.company)}</h4><p class="text-xs text-slate-600 font-medium">${window.esc(p.ProjectName||p.projectName)}</p>${detailBtn}</div>`); 
          markers.push(marker); bounds.push([parseFloat(pLat), parseFloat(pLng)]); 
        } 
      });
      if (radiusFilter.active && radiusFilter.lat != null && radiusFilter.lng != null) {
        window.applyRadiusFilter(radiusFilter.lat, radiusFilter.lng);
      } else if(bounds.length > 0) {
        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 12 });
      }
    };

window.parseFreqToNumber = function(freqStr) {
    if (!freqStr) return 1; // กันเหนียว Default 1
    let match = freqStr.match(/(\d+)/);
    return match ? parseInt(match[1]) : 1;
};

// 2. ตัวช่วยคำนวณสถานะบำรุงรักษา (รับค่า วัน COD, ความถี่ต่อปี, จำนวนปีสัญญา, จำนวนครั้งที่ทำไปแล้ว)
window.calculateMaintStatus = function(startDate, freqPerYear, durationYears, actualDoneCount) {
    if (!startDate) return null;
    
    let cod = new Date(startDate);
    let today = new Date(); // หรือใช้วันที่ปัจจุบัน
    let totalExpectedRounds = parseInt(durationYears) * parseInt(freqPerYear) || 0;
    
    // คำนวณระยะห่างระหว่างรอบ (เดือน)
    let monthsPerRound = 12 / freqPerYear; 
    
    // คำนวณว่า "ณ วันนี้" ควรจะบำรุงรักษาไปแล้วกี่ครั้ง
    let monthsPassed = (today.getFullYear() - cod.getFullYear()) * 12 + (today.getMonth() - cod.getMonth());
    let expectedDoneCount = Math.floor(monthsPassed / monthsPerRound) + 1; // +1 คือรอบของปัจจุบันที่ต้องทำ
    
    // กันไม่ให้เกินจำนวนงวดสูงสุดในสัญญา
    if (expectedDoneCount > totalExpectedRounds) expectedDoneCount = totalExpectedRounds;
    if (expectedDoneCount < 1) expectedDoneCount = 1;

    // ยอดค้าง (Backlog)
    let backlog = expectedDoneCount - actualDoneCount;
    if (backlog < 0) backlog = 0; // ทำล่วงหน้า ไม่มีค้าง

    // คำนวณเดือนที่ครบกำหนดของรอบปัจจุบัน (อิงจาก COD และรอบที่ควรจะทำ)
    // เอา COD บวกจำนวนเดือนตามรอบที่ต้องทำถัดไป
    let nextDueDate = new Date(cod);
    nextDueDate.setMonth(cod.getMonth() + (actualDoneCount * monthsPerRound));
    
    const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
    let dueMonthText = thaiMonths[nextDueDate.getMonth()] + " " + (nextDueDate.getFullYear() + 543);

    return {
        totalRounds: totalExpectedRounds,
        currentProgress: actualDoneCount,
        backlog: backlog,
        dueMonthText: dueMonthText,
        isOverdue: nextDueDate < today
    };
};

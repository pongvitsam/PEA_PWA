<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เข้าสู่ระบบ — PEA/PWA Smart Map</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    body {
      min-height: 100vh; margin: 0;
      background: linear-gradient(135deg, #0f766e 0%, #14b8a6 45%, #5eead4 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Prompt', sans-serif;
    }
    .login-card {
      width: min(420px, 92vw);
      background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(15, 118, 110, 0.25);
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: #fff; padding: 2rem 1.5rem 1.5rem; text-align: center;
    }
    .login-header h1 { font-size: 1.35rem; font-weight: 700; margin: 0; }
    .login-body { padding: 1.5rem; }
    .btn-teal { background: linear-gradient(135deg, #14b8a6, #0d9488); border: none; color: #fff; font-weight: 600; }
    .btn-teal:hover { filter: brightness(1.05); color: #fff; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <i class="fa-solid fa-bolt fa-2x mb-2"></i>
      <h1>PEA/PWA Smart Map</h1>
      <small class="opacity-90">ระบบแผนที่และแผนดับไฟ</small>
    </div>
    <div class="login-body">
      <div class="mb-3">
        <label class="form-label small fw-bold text-muted">ชื่อผู้ใช้</label>
        <input type="text" id="loginUser" class="form-control" placeholder="admin" autocomplete="username">
      </div>
      <div class="mb-3">
        <label class="form-label small fw-bold text-muted">รหัสผ่าน</label>
        <input type="password" id="loginPass" class="form-control" placeholder="••••" autocomplete="current-password">
      </div>
      <button class="btn btn-teal w-100 py-2" id="btnLogin"><i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ</button>
      <p class="text-muted small text-center mt-3 mb-0">
        <i class="fa-solid fa-circle-info"></i> ต้องเข้าสู่ระบบก่อนใช้งาน
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/pwa-gas-api.js"></script>
  <script>
    const SESSION_TTL_MS = 6 * 60 * 60 * 1000;

    function persistAuth(role, sessionToken, expireMs) {
      localStorage.setItem('pwa_token', JSON.stringify({
        role: role,
        sessionToken: sessionToken,
        expire: expireMs || (Date.now() + SESSION_TTL_MS)
      }));
    }

    function goApp() { window.location.href = 'app.html'; }

    function hasValidToken(t) {
      return t && t.role && t.role !== 'guest' && t.sessionToken && t.expire && t.expire > Date.now();
    }

    try {
      const raw = localStorage.getItem('pwa_token');
      if (raw) {
        const t = JSON.parse(raw);
        if (hasValidToken(t)) goApp();
        else localStorage.removeItem('pwa_token');
      }
    } catch (e) { localStorage.removeItem('pwa_token'); }

    document.getElementById('btnLogin').onclick = function () {
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      if (!user) { Swal.fire({ icon: 'warning', title: 'กรอกชื่อผู้ใช้' }); return; }
      Swal.fire({ title: 'กำลังเข้าสู่ระบบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      google.script.run.withSuccessHandler(data => {
        Swal.close();
        if (!data.success) { Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: data.message }); return; }
        if (!data.sessionToken) { Swal.fire({ icon: 'error', title: 'ไม่ได้รับ session จากเซิร์ฟเวอร์' }); return; }
        persistAuth(data.role, data.sessionToken, data.expire || (Date.now() + SESSION_TTL_MS));
        goApp();
      }).withFailureHandler(err => {
        Swal.fire({ icon: 'error', title: 'เชื่อมต่อไม่สำเร็จ', text: err.message });
      }).authenticate(user, pass);
    };

    document.getElementById('loginPass').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });
  </script>
</body>
</html>
